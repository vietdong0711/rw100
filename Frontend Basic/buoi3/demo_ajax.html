        <!-- bs3-cdn: import thư viện jquery và bootstrap -->

        <!-- Latest compiled and minified CSS & JS -->
        <link rel="stylesheet" media="screen" href="//netdna.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css" />
        <script src="//code.jquery.com/jquery.js"></script>

    <body>
        <!-- bs3-container: bo chiều rộng của giao diện lại -->
        <div class="container">
            <!-- bs3-form:horizontal -->
            <form id="accountForm" action="" class="form-horizontal" role="form">
                <div class="form-group">
                    <legend>Quản lý account</legend>
                </div>

                <!-- bs3-col:8 : để chứa các ô input -->
                <!-- bs3-col:4 : để chứa các button -->
                <div class="col-xs-8 col-sm-8 col-md-8 col-lg-8">
                    <!-- bs3-input:text:h -->
                    <div class="form-group">
                        <label for="inputAvatar" class="col-sm-2 control-label">Avatar:</label>
                        <div class="col-sm-10">
                            <input type="text" name="Avatar" id="inputAvatar" class="form-control" value="" />
                        </div>
                    </div>

                    <!-- bs3-input:text:h -->
                    <div class="form-group">
                        <label for="inputUsername" class="col-sm-2 control-label">Username:</label>
                        <div class="col-sm-10">
                            <input type="text" name="Username" id="inputUsername" class="form-control" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="inputFullname" class="col-sm-2 control-label">Fullname:</label>
                        <div class="col-sm-10">
                            <input type="text" name="Fullname" id="inputFullname" class="form-control" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="form-group">
                            <label for="inputAge" class="col-sm-2 control-label">Age:</label>
                            <div class="col-sm-10">
                                <input type="number" name="" id="inputAge" class="form-control" required />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
                    <div class="form-group">
                        <div class="col-sm-10 col-sm-offset-2">
                            <button id="btnCreate" type="submit" class="btn btn-primary">Create</button>
                        </div>
                        <div class="col-sm-10 col-sm-offset-2">
                            <button id="btnUpdate" type="button" class="btn btn-info">Update</button>
                        </div>
                    </div>
                </div>
            </form>

            <!-- bs3-table:.... -->

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Avatar</th>
                        <th>Username</th>
                        <th>FullName</th>
                        <th>Age</th>
                        <th>Action</th>
                    </tr>
